# Podman Workflow Update Go Module Dependency

## Action

Follow the update-go-module-dependency workflow:
1. Update go.mod to specify the new version of the dependency.
2. Update go.sum to reflect new dependency checksums.
3. Update vendor/ directory to include new or changed files from the dependency.
4. Update vendor/modules.txt to reflect the new dependency state.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: go.mod, go.sum, vendor/<dependency>/*

